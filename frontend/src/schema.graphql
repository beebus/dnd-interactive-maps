type Query {
  allLocations(mapName: String): [LocationType]
}

type Mutation {
  createLocation(name: String!, x: Float!, y: Float!, mapName: String!): CreateLocationType
}

type CreateLocationType {
  location: LocationType
}

type LocationType {
  id: ID!
  name: String!
  x: Float!
  y: Float!
  pois: [PointOfInterestType!]!
}

type PointOfInterestType {
  id: ID!
  location: LocationType!
  title: String!
  description: String!
}