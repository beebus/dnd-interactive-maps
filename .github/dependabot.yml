# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python/pip - Django backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # npm - React frontend
  - package-ecosystem: "npm"
    # Look for `package.json` and `lock` files in the `frontend` directory
    directory: "/frontend"
    schedule:
      interval: "weekly"
    ignore:
      # vite 8 is incompatible with @vitejs/plugin-react until it adds vite 8 peer support
      - dependency-name: "vite"
        versions: [ ">=8" ]
      - dependency-name: "@vitejs/plugin-react"
        update-types: [ "version-update:semver-major", "version-update:semver-minor" ]

  # Docker - frontend
  - package-ecosystem: "docker"
    # Look for a `Dockerfile` in the `frontend` directory
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Docker - backend
  - package-ecosystem: "docker"
    # Look for a `Dockerfile` in the `backend` directory
    directory: "/backend"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
