name: E2E Tests

on: [push, pull_request]

permissions:
  contents: read

env:
  DB_NAME: ci_e2e
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: localhost
  DB_PORT: "5432"
  SECRET_KEY: ci-e2e-secret-key
  DEBUG: "True"

jobs:
  selenium:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: ci_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply migrations
        working-directory: backend
        run: python manage.py migrate --no-input

      - name: Load location fixtures
        working-directory: backend
        run: python manage.py loaddata mapdata/fixtures/locations.json

      - name: Start backend server
        working-directory: backend
        run: |
          nohup python manage.py runserver 0.0.0.0:8000 --noreload > backend.log 2>&1 &
          npx --yes wait-on@8 -t 60000 -i 1000 tcp:localhost:8000 || (cat backend.log; exit 1)

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend server
        working-directory: frontend
        run: |
          nohup npm run dev -- --host 0.0.0.0 > frontend.log 2>&1 &
          npx --yes wait-on@8 -t 60000 -i 1000 http://localhost:3000 || (cat frontend.log; exit 1)

      - name: Install e2e dependencies
        run: pip install -r e2e/requirements.txt

      - name: Run Selenium tests
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_HEADLESS: "1"
        run: pytest e2e

      - name: Show server logs on failure
        if: failure()
        run: |
          echo "--- backend.log ---"
          cat backend/backend.log || true
          echo "--- frontend.log ---"
          cat frontend/frontend.log || true
